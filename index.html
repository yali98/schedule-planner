<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 스케줄 · 플래너</title>
<style>
  :root{
    --bg:#0f1115; --panel:24,27,34; --panel2:#1f232c; --line:#2a2f3a;
    --txt:#e6e9ef; --muted:#8b93a3; --accent:#6ea8fe;
    --red:#ff6b6b; --amber:#ffc14d; --green:#4dd599;
    --panelAlpha:.92;
  }
  @media (prefers-color-scheme: light){
    :root{
      --bg:#f4f6fa; --panel:255,255,255; --panel2:#eef1f7; --line:#e2e6ee;
      --txt:#1a1d24; --muted:#6b7280; --accent:#2563eb;
      --red:#dc2626; --amber:#d97706; --green:#059669;
    }
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;color:var(--txt);background:transparent;
    font-family:"Pretendard","Segoe UI",system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased;overflow:hidden}

  /* 투명도 조절 대상이 되는 배경판 */
  #backdrop{position:fixed;inset:0;background:var(--bg);z-index:-1;
    opacity:var(--bgOpacity,1);transition:opacity .15s;border-radius:14px}

  /* 상단 드래그/제어 바 */
  #bar{display:flex;align-items:center;gap:8px;padding:8px 10px;
    -webkit-app-region:drag;user-select:none}
  #bar .grip{font-size:13px;font-weight:650;color:var(--muted);flex:1;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #bar .ctl{-webkit-app-region:no-drag;display:flex;align-items:center;gap:6px}
  #bar input[type=range]{width:74px;accent-color:var(--accent);cursor:pointer}
  #bar button{-webkit-app-region:no-drag;background:transparent;border:none;
    color:var(--muted);font-size:14px;cursor:pointer;padding:3px 6px;border-radius:7px}
  #bar button:hover{background:var(--panel2);color:var(--txt)}
  #bar button.on{color:#fff;background:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  #bar button.on:hover{background:var(--accent);opacity:.9}
  #bar button:disabled{opacity:.35;cursor:default}
  #bar button:disabled:hover{background:transparent;color:var(--muted)}
  .winbtns{display:none;gap:2px}
  body.electron .winbtns{display:flex}
  body.electron #opacWrap{display:flex}
  #opacWrap{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}

  /* 스크롤 영역 */
  #scroll{position:absolute;top:42px;left:0;right:0;bottom:0;overflow-y:auto;padding:4px 16px 26px}
  #scroll::-webkit-scrollbar{width:8px}
  #scroll::-webkit-scrollbar-thumb{background:var(--panel2);border-radius:8px}

  .topline{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:4px}
  h1{font-size:18px;margin:0;font-weight:700;letter-spacing:-.3px}
  .today{color:var(--muted);font-size:12.5px}
  .sub{color:var(--muted);font-size:11.5px;margin:0 0 14px}
  .overall{height:5px;background:var(--panel2);border-radius:99px;overflow:hidden;margin:10px 0 20px}
  .overall>div{height:100%;background:var(--accent);transition:width .4s}

  .card{background:rgba(var(--panel),calc(var(--panelAlpha) * var(--bgOpacity,1)));
    border:1px solid var(--line);
    border-radius:14px;padding:14px 16px;margin-bottom:13px;backdrop-filter:blur(2px);
    transition:background-color .15s}
  .card.done{opacity:.55}
  .chead{display:flex;align-items:center;gap:10px;flex-wrap:wrap;cursor:pointer}
  .chevron{font-size:11px;color:var(--muted);transition:transform .15s;flex-shrink:0}
  .card.collapsed .chevron{transform:rotate(-90deg)}
  .card.collapsed .note{display:none}
  .card.collapsed ul{display:block;margin-top:6px}
  .card.collapsed li:not(.urgent){display:none}
  .card.collapsed li.urgent{background:color-mix(in srgb,var(--red) 10%,transparent);border-radius:8px}
  .ttl{font-size:15px;font-weight:650;flex:1;min-width:160px}
  .dday{font-size:12px;font-weight:700;padding:3px 9px;border-radius:99px;white-space:nowrap}
  .dday.red{background:color-mix(in srgb,var(--red) 18%,transparent);color:var(--red)}
  .dday.amber{background:color-mix(in srgb,var(--amber) 18%,transparent);color:var(--amber)}
  .dday.green{background:color-mix(in srgb,var(--green) 18%,transparent);color:var(--green)}
  .dday.gray{background:var(--panel2);color:var(--muted)}
  .meta{color:var(--muted);font-size:12px;margin:6px 0 0}
  .note{color:var(--muted);font-size:12px;font-style:italic;margin:4px 0 0}
  .bar{height:5px;background:var(--panel2);border-radius:99px;overflow:hidden;margin:11px 0 4px}
  .bar>div{height:100%;background:var(--green);transition:width .4s}
  .prog{font-size:11.5px;color:var(--muted);margin-bottom:6px}

  ul{list-style:none;margin:8px 0 0;padding:0}
  li{display:flex;align-items:flex-start;gap:9px;padding:7px;border-radius:9px}
  li:hover{background:var(--panel2)}
  li.chk .txt{text-decoration:line-through;color:var(--muted)}
  input[type=checkbox]{width:17px;height:17px;margin-top:1px;accent-color:var(--accent);cursor:pointer;flex-shrink:0}
  .txt{font-size:13.5px;line-height:1.45}
  .sdate{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}
  .sdate.late{color:var(--red);font-weight:600}
  .foot{color:var(--muted);font-size:11px;text-align:center;margin-top:24px;line-height:1.7}
  code{background:var(--panel2);padding:1px 6px;border-radius:6px;font-size:11px}

  .tabs{display:flex;gap:6px;margin-bottom:14px}
  .tabbtn{background:transparent;border:1px solid var(--line);color:var(--muted);
    font-size:12px;padding:5px 13px;border-radius:99px;cursor:pointer}
  .tabbtn:hover{color:var(--txt)}
  .tabbtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

  .dayblock{margin-bottom:16px}
  .dayblock.today .daydate{color:var(--accent)}
  .dayhead{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .daydate{font-size:13.5px;font-weight:700}
  .daydday{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:99px}
  .daylist{list-style:none;margin:0;padding:0;border-radius:12px;overflow:hidden;
    background:rgba(var(--panel),calc(var(--panelAlpha) * var(--bgOpacity,1)));
    border:1px solid var(--line)}
  .daylist li{display:flex;align-items:flex-start;gap:9px;padding:9px 12px}
  .daylist li:not(:last-child){border-bottom:1px solid var(--line)}
  .daylist li:hover{background:var(--panel2)}
  .daylist li.chk .txt{text-decoration:line-through;color:var(--muted)}
  .tasktag{font-size:10.5px;color:var(--muted);margin-top:2px}
</style>
</head>
<body>
<div id="backdrop"></div>

<div id="bar">
  <span class="grip">📌 스케줄플래너</span>
  <div class="ctl">
    <button id="undo" title="마지막 체크 취소" disabled>↺</button>
    <button id="sync" title="기기 간 동기화 설정">🔄</button>
    <span id="syncStatus" style="font-size:10.5px;color:var(--muted)"></span>
    <span id="opacWrap">투명 <input type="range" id="opac" min="25" max="100" value="100"></span>
    <div class="winbtns">
      <button id="pin" title="항상 위에">📍</button>
      <button id="min" title="최소화">—</button>
      <button id="close" title="닫기">✕</button>
    </div>
  </div>
</div>

<div id="scroll">
  <div class="topline">
    <h1>나의 스케줄 · 플래너</h1>
    <div class="today" id="today"></div>
  </div>
  <p class="sub">계획 수정은 Claude 세션에 말로 부탁하세요 · 완료 체크는 자동 저장</p>
  <div class="overall"><div id="overallBar"></div></div>
  <div class="tabs">
    <button class="tabbtn active" data-view="cards">작업별</button>
    <button class="tabbtn" data-view="timeline">날짜별</button>
  </div>
  <div id="cards"></div>
  <div id="timeline" style="display:none"></div>
  <div class="foot">
    데이터 <code>tasks.js</code> · 마지막 계획 갱신 <span id="updated"></span>
  </div>
</div>

<script src="tasks.js"></script>
<script>
const $=(s,el=document)=>el.querySelector(s);
const pad=n=>String(n).padStart(2,'0');
const todayStr=(()=>{const d=new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;})();
const DOW=["일","월","화","수","목","금","토"];

function daysBetween(a,b){const da=new Date(a+"T00:00:00"),db=new Date(b+"T00:00:00");return Math.round((db-da)/86400000);}
function ddayLabel(dl){
  if(!dl) return {txt:"기한 미정",cls:"gray"};
  const d=daysBetween(todayStr,dl);
  if(d<0) return {txt:`D+${-d} 지남`,cls:"red"};
  if(d===0) return {txt:"D-DAY",cls:"red"};
  if(d<=2) return {txt:`D-${d}`,cls:"red"};
  if(d<=5) return {txt:`D-${d}`,cls:"amber"};
  return {txt:`D-${d}`,cls:"green"};
}
function fmtDate(s){const d=new Date(s+"T00:00:00");return `${pad(d.getMonth()+1)}/${pad(d.getDate())}(${DOW[d.getDay()]})`;}

const KEY="planner_checks_v1";
const checks=JSON.parse(localStorage.getItem(KEY)||"{}");
const saveChecks=()=>localStorage.setItem(KEY,JSON.stringify(checks));

const KEY2="planner_expanded_v1";
const expanded=JSON.parse(localStorage.getItem(KEY2)||"{}");
const saveExpanded=()=>localStorage.setItem(KEY2,JSON.stringify(expanded));

const KEY3="planner_meta_v1";
const meta=JSON.parse(localStorage.getItem(KEY3)||"{}");
const saveMeta=()=>localStorage.setItem(KEY3,JSON.stringify(meta));

// ── 기기 간 동기화 (GitHub Gist) ──
const SYNC_TOKEN_KEY="planner_gh_token";
const SYNC_GIST_KEY="planner_gist_id";
const SYNC_FILENAME="planner-sync.json";
const getToken=()=>localStorage.getItem(SYNC_TOKEN_KEY)||"";
const getGistId=()=>localStorage.getItem(SYNC_GIST_KEY)||"";

function setSyncStatus(s){
  const el=$("#syncStatus");
  if(!el) return;
  const now=new Date();
  const hhmm=`${pad(now.getHours())}:${pad(now.getMinutes())}`;
  el.textContent = s==="ok" ? `동기화 ${hhmm}` : s==="error" ? "동기화 오류" : "";
}

async function ghFetch(url,opts={}){
  const token=getToken();
  if(!token) throw new Error("토큰 없음");
  return fetch(url,{...opts,headers:{
    "Authorization":`Bearer ${token}`,
    "Accept":"application/vnd.github+json",
    ...(opts.headers||{})
  }});
}

async function ensureGist(){
  let id=getGistId();
  if(id) return id;
  const res=await ghFetch("https://api.github.com/gists",{
    method:"POST",
    body:JSON.stringify({description:"스케줄플래너 체크 동기화",public:false,
      files:{[SYNC_FILENAME]:{content:JSON.stringify({checks:{},ts:{}})}}})
  });
  if(!res.ok) throw new Error("Gist 생성 실패 ("+res.status+")");
  const data=await res.json();
  localStorage.setItem(SYNC_GIST_KEY,data.id);
  return data.id;
}

async function pullAndMerge(){
  if(!getToken()||!getGistId()) return;
  try{
    const res=await ghFetch(`https://api.github.com/gists/${getGistId()}`);
    if(!res.ok) throw new Error("pull 실패");
    const data=await res.json();
    const file=data.files[SYNC_FILENAME];
    if(!file) return;
    const remote=JSON.parse(file.content||"{}");
    let changed=false;
    Object.keys(remote.ts||{}).forEach(k=>{
      const rts=remote.ts[k];
      if(!meta[k]||rts>meta[k]){
        if(checks[k]!==remote.checks[k]){ checks[k]=remote.checks[k]; changed=true; }
        meta[k]=rts;
      }
    });
    if(changed){ saveChecks(); saveMeta(); render(); }
    setSyncStatus("ok");
  }catch(e){ setSyncStatus("error"); }
}

let pushTimer=null;
function schedulePush(){
  clearTimeout(pushTimer);
  pushTimer=setTimeout(pushToGist,800);
}
async function pushToGist(){
  if(!getToken()) return;
  try{
    const id=await ensureGist();
    const res=await ghFetch(`https://api.github.com/gists/${id}`,{
      method:"PATCH",
      body:JSON.stringify({files:{[SYNC_FILENAME]:{content:JSON.stringify({checks,ts:meta})}}})
    });
    if(!res.ok) throw new Error("push 실패");
    setSyncStatus("ok");
  }catch(e){ setSyncStatus("error"); }
}

const undoStack=[];
function setChecked(stepId,checked){
  if(checked&&!checks[stepId]) undoStack.push(stepId);
  checks[stepId]=checked;
  meta[stepId]=Date.now();
  saveChecks();
  saveMeta();
  render();
  schedulePush();
}
function updateUndoBtn(){
  $("#undo").disabled=undoStack.length===0;
}

function render(){
  $("#today").textContent=fmtDate(todayStr)+" 기준";
  $("#updated").textContent=PLANNER.updated;
  const tasks=[...PLANNER.tasks].sort((a,b)=>{
    const ax=a.deadline?daysBetween(todayStr,a.deadline):9999;
    const bx=b.deadline?daysBetween(todayStr,b.deadline):9999;
    if(ax!==bx) return ax-bx;
    return (a.priority||9)-(b.priority||9);
  });
  let total=0,done=0;
  const cards=$("#cards");cards.innerHTML="";
  tasks.forEach(t=>{
    const d=t.steps.filter(s=>checks[s.id]).length, tot=t.steps.length;
    total+=tot;done+=d;
    const allDone=d===tot&&tot>0;
    const dl=ddayLabel(t.deadline);
    const isOpen=expanded.hasOwnProperty(t.id)?expanded[t.id]:(dl.cls==='red'&&!allDone);
    const card=document.createElement("div");
    card.className="card"+(allDone?" done":"")+(isOpen?"":" collapsed");
    card.innerHTML=`
      <div class="chead">
        <span class="chevron">▾</span>
        <div class="ttl">${t.title}</div>
        <div class="dday ${allDone?'green':dl.cls}">${allDone?'완료 ✓':dl.txt}</div>
      </div>
      <div class="meta">${t.deadline?`마감 ${fmtDate(t.deadline)} · `:''}${t.deadlineNote||''}</div>
      ${t.note?`<div class="note">${t.note}</div>`:''}
      <div class="bar"><div style="width:${tot?d/tot*100:0}%"></div></div>
      <div class="prog">${d}/${tot} 완료</div>
      <ul></ul>`;
    card.querySelector(".chead").addEventListener("click",()=>{
      const willBeCollapsed=!card.classList.contains("collapsed");
      card.classList.toggle("collapsed",willBeCollapsed);
      expanded[t.id]=!willBeCollapsed;
      saveExpanded();
    });
    const ul=card.querySelector("ul");
    t.steps.forEach(s=>{
      const li=document.createElement("li");
      const c=!!checks[s.id];
      const over=!c&&daysBetween(todayStr,s.date)<0;
      const urgent=!c&&daysBetween(todayStr,s.date)<=1;
      li.className=[c?"chk":"",urgent?"urgent":""].join(" ").trim();
      li.innerHTML=`<input type="checkbox" ${c?'checked':''}>
        <div><div class="txt">${s.text}</div>
        <div><span class="sdate ${over?'late':''}">${fmtDate(s.date)}${over?' · 지남':''}</span></div></div>`;
      li.querySelector("input").addEventListener("change",e=>setChecked(s.id,e.target.checked));
      ul.appendChild(li);
    });
    cards.appendChild(card);
  });
  $("#overallBar").style.width=(total?done/total*100:0)+"%";
  updateUndoBtn();
  renderTimeline();
}

function renderTimeline(){
  const byDate={};
  PLANNER.tasks.forEach(t=>t.steps.forEach(s=>{
    if(checks[s.id]) return;
    (byDate[s.date]=byDate[s.date]||[]).push({step:s,taskTitle:t.title});
  }));
  const dates=Object.keys(byDate).sort();
  const wrap=$("#timeline");wrap.innerHTML="";
  dates.forEach(date=>{
    const isToday=date===todayStr;
    const dl=ddayLabel(date);
    const block=document.createElement("div");
    block.className="dayblock"+(isToday?" today":"");
    block.innerHTML=`
      <div class="dayhead">
        <span class="daydate">${fmtDate(date)}${isToday?' · 오늘':''}</span>
        <span class="daydday dday ${dl.cls}">${dl.txt}</span>
      </div>
      <ul class="daylist"></ul>`;
    const ul=block.querySelector("ul");
    byDate[date].forEach(({step:s,taskTitle})=>{
      const li=document.createElement("li");
      li.innerHTML=`<input type="checkbox">
        <div><div class="txt">${s.text}</div><div class="tasktag">${taskTitle}</div></div>`;
      li.querySelector("input").addEventListener("change",e=>setChecked(s.id,e.target.checked));
      ul.appendChild(li);
    });
    wrap.appendChild(block);
  });
}

render();

// ── 체크 취소 ──
$("#undo").addEventListener("click",()=>{
  const last=undoStack.pop();
  if(!last) return;
  checks[last]=false;
  meta[last]=Date.now();
  saveChecks();
  saveMeta();
  render();
  schedulePush();
});

// ── 동기화 설정 ──
$("#sync").addEventListener("click",async()=>{
  const tokenInput=window.prompt("GitHub Personal Access Token 입력 (gist 권한 필요).\n비워두고 확인하면 동기화를 끕니다.", getToken());
  if(tokenInput===null) return;
  if(tokenInput.trim()===""){
    localStorage.removeItem(SYNC_TOKEN_KEY);
    localStorage.removeItem(SYNC_GIST_KEY);
    setSyncStatus("");
    return;
  }
  localStorage.setItem(SYNC_TOKEN_KEY,tokenInput.trim());

  const gistInput=window.prompt("다른 기기에서 이미 동기화를 설정했다면, 그때 알려준 Gist ID를 입력하세요.\n처음 설정하는 거면 비워두세요.", getGistId());
  if(gistInput&&gistInput.trim()!=="") localStorage.setItem(SYNC_GIST_KEY,gistInput.trim());

  try{
    const id=await ensureGist();
    await pullAndMerge();
    await pushToGist();
    if(!gistInput||gistInput.trim()===""){
      alert("동기화 설정 완료!\nGist ID: "+id+"\n\n다른 기기에서도 🔄 버튼을 눌러 같은 토큰과 이 Gist ID를 입력하면 연결됩니다.");
    }else{
      alert("동기화 설정 완료!");
    }
  }catch(e){
    alert("동기화 설정 실패: "+e.message);
  }
});

if(getToken()&&getGistId()){
  pullAndMerge();
  setInterval(pullAndMerge,20000);
}

// ── 보기 전환 (작업별 / 날짜별) ──
document.querySelectorAll(".tabbtn").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".tabbtn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    const view=btn.dataset.view;
    $("#cards").style.display=view==="cards"?"":"none";
    $("#timeline").style.display=view==="timeline"?"":"none";
  });
});

// ── 투명도 슬라이더 ──
$("#opac").addEventListener("input",e=>{
  document.documentElement.style.setProperty('--bgOpacity', e.target.value/100);
});

// ── Electron 창 제어 ──
if(window.PLANNER_ENV && window.PLANNER_ENV.isElectron){
  document.body.classList.add('electron');
  $("#close").onclick=()=>PLANNER_ENV.close();
  $("#min").onclick=()=>PLANNER_ENV.minimize();
  $("#pin").onclick=()=>PLANNER_ENV.togglePin();
  PLANNER_ENV.onPinState(v=>{
    const b=$("#pin");
    b.classList.toggle('on',v);
    b.title = v ? "항상 위에: 켜짐 (클릭하여 끄기)" : "항상 위에: 꺼짐 (클릭하여 켜기)";
  });
}
</script>
</body>
</html>
